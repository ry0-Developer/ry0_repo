name: Update Amethyst

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # This fixes the hidden upload error

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create folders
        run: mkdir -p apps/games

      - name: Download Amethyst ZIP
        run: |
          curl -L "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip" -o amethyst.zip

      - name: Extract IPA
        run: unzip amethyst.zip

      - name: Move IPA
        run: |
          IPA=$(find . -name "*.ipa" | head -n 1)
          mv "$IPA" apps/games/amethyst.ipa

      - name: Cleanup
        run: rm -rf amethyst.zip

      - name: Update version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" repo.json

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/games/amethyst.ipa repo.json
          git commit -m "Update Amethyst to $VERSION" || echo "No changes to commit"
          git push
