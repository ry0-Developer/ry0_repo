name: Update Amethyst

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Amethyst ZIP
        run: |
          curl -L "https://nightly.link/AngelAuraMC/Amethyst-iOS/workflows/development/main/org.angelauramc.amethyst-ios.ipa.zip" -o amethyst.zip

      - name: Extract IPA
        run: unzip amethyst.zip

      - name: Rename IPA
        run: |
          IPA=$(find . -name "*.ipa" | head -n 1)
          mv "$IPA" amethyst.ipa

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly --title "Nightly Builds" --notes "Auto-updated nightly builds" || echo "Release already exists"
          gh release upload nightly amethyst.ipa --clobber

      - name: Safely update JSON version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          jq ".apps[0].versions[0].version = \"$VERSION\"" repo.json > temp.json && mv temp.json repo.json

      - name: Commit & push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Update Amethyst to $VERSION" || echo "No changes to commit"
          git push
