name: Update DolphiniOS

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Pre-release DolphiniOS
        run: |
          mkdir -p apps/emulators
          
          API_URL="https://api.github.com/repos/OatmealDome/dolphin-ios/releases"
          
          DOWNLOAD_URL=$(curl -s "$API_URL" | grep "browser_download_url.*\.ipa" | cut -d '"' -f 4 | head -n 1)
          REAL_VERSION=$(curl -s "$API_URL" | jq -r '.[0].tag_name' | sed 's/^v//')
          
          if [ "$REAL_VERSION" == "null" ] || [ -z "$REAL_VERSION" ]; then
            REAL_VERSION="Nightly"
          fi
          
          echo "Version: $REAL_VERSION"
          curl -L "$DOWNLOAD_URL" -o apps/emulators/dolphinios.ipa
          echo "$REAL_VERSION" > version.txt

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload nightly apps/emulators/dolphinios.ipa --clobber || gh release create nightly apps/emulators/dolphinios.ipa --clobber

      - name: Update JSON Data
        run: |
          REAL_VERSION=$(cat version.txt)
          DATE_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILESIZE=$(stat -c%s "apps/emulators/dolphinios.ipa" || echo "100000000")
          
          # هنا الروبوت صار يبحث عن الاسم الجديد بدل القديم
          jq --arg version "$REAL_VERSION" \
             --arg date "$DATE_NOW" \
             --argjson size "$FILESIZE" \
             '(.apps[] | select(.name == "DolphiniOS (nightly)")).versions[0] |= . + {version: $version, date: $date, size: $size}' repo.json > temp.json && mv temp.json repo.json

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Auto-update DolphiniOS to Pre-release $REAL_VERSION" || echo "No changes"
          git push
