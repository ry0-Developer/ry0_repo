name: Update DolphiniOS

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch from Oatmealdome Source
        run: |
          mkdir -p apps/emulators
          
          # سحب البيانات من سورس المطور الرسمي
          SOURCE_JSON=$(curl -s "https://altstore.oatmealdome.me")
          DOWNLOAD_URL=$(echo "$SOURCE_JSON" | jq -r '.apps[0].versions[0].downloadURL')
          REAL_VERSION=$(echo "$SOURCE_JSON" | jq -r '.apps[0].versions[0].version')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Failed to fetch from AltStore source, falling back to GitHub API..."
            DOWNLOAD_URL=$(curl -s https://api.github.com/repos/OatmealDome/dolphin-ios/releases/latest | grep "browser_download_url.*\.ipa" | cut -d '"' -f 4 | head -n 1)
            REAL_VERSION=$(curl -s https://api.github.com/repos/OatmealDome/dolphin-ios/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          fi
          
          echo "Version: $REAL_VERSION"
          curl -L "$DOWNLOAD_URL" -o apps/emulators/dolphinios.ipa
          
          # حفظ رقم الإصدار في ملف مؤقت لتمريره للخطوات القادمة
          echo "$REAL_VERSION" > version.txt

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload nightly apps/emulators/dolphinios.ipa --clobber || gh release create nightly apps/emulators/dolphinios.ipa --clobber

      - name: Update JSON Data
        run: |
          REAL_VERSION=$(cat version.txt)
          DATE_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILESIZE=$(stat -c%s "apps/emulators/dolphinios.ipa" || echo "100000000")
          
          jq --arg version "$REAL_VERSION" \
             --arg date "$DATE_NOW" \
             --argjson size "$FILESIZE" \
             '(.apps[] | select(.name == "DolphiniOS")).versions[0] |= . + {version: $version, date: $date, size: $size}' repo.json > temp.json && mv temp.json repo.json

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Auto-update DolphiniOS to $REAL_VERSION" || echo "No changes"
          git push
