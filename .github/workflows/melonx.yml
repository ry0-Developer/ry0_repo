name: Update MeloNX

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Latest MeloNX
        run: |
          mkdir -p apps/emulators
          
          LATEST_ID=$(curl -s "https://git.ryujinx.app/melonx/emu/-/releases" | grep -oP 'package_files/\K[0-9]+' | sort -rn | head -n 1 || true)
          if [ -z "$LATEST_ID" ]; then LATEST_ID="1824"; fi
          
          curl -L "https://git.ryujinx.app/melonx/emu/-/package_files/$LATEST_ID/download" -o apps/emulators/melonx.ipa

      - name: Upload to Nightly Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create nightly --title "Nightly Builds" --notes "Auto-updated nightly builds" || echo "Release exists"
          gh release upload nightly apps/emulators/melonx.ipa --clobber

      - name: Update JSON Data with Real Version
        run: |
          # 1. سحب رقم الإصدار من قاعدة البيانات (API) الرسمية للمطور مباشرة!
          REAL_VERSION=$(curl -s "https://git.ryujinx.app/api/v4/projects/melonx%2Femu/releases" | jq -r '.[0].tag_name' | sed 's/^v//')
          
          # 2. إذا الموقع كان عليه ضغط وما رد الـ API، نسحب الرقم من الرابط المباشر
          if [ "$REAL_VERSION" == "null" ] || [ -z "$REAL_VERSION" ]; then
            FINAL_URL=$(curl -sLI -o /dev/null -w %{url_effective} "https://git.ryujinx.app/melonx/emu/-/releases/permalink/latest")
            REAL_VERSION=$(basename "$FINAL_URL" | sed 's/^v//')
          fi
          
          # 3. حماية أخيرة: مستحيل يكتب Latest بعد اليوم، بيكتب 2.3.1 كحد أدنى لو خرب سيرفرهم
          if [ "$REAL_VERSION" == "latest" ] || [ -z "$REAL_VERSION" ]; then 
            REAL_VERSION="2.3.1"
          fi
          
          DATE_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILESIZE=$(stat -c%s "apps/emulators/melonx.ipa" || echo "110000000")
          
          # إدخال البيانات في السورس بدقة
          jq --arg version "$REAL_VERSION" \
             --arg date "$DATE_NOW" \
             --argjson size "$FILESIZE" \
             '.apps[1].versions[0].version = $version | 
              .apps[1].versions[0].date = $date | 
              .apps[1].versions[0].size = $size' repo.json > temp.json && mv temp.json repo.json

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Auto-update MeloNX to Version $REAL_VERSION" || echo "No changes"
          git push
