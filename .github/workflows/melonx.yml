name: Update MeloNX

on:
  schedule:
    - cron: "0 */12 * * *"  # يعمل مرتين يومياً
  workflow_dispatch:        # تشغيل يدوي

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare Emulators Folder
        run: |
          # حذف أي ملف أو مجلد قديم لتجنب تعارض الأسماء (حل مشكلة File exists)
          rm -rf apps/emulators
          mkdir -p apps/emulators

      - name: Get Latest MeloNX IPA
        run: |
          # جلب أحدث رابط تحميل ينتهي بـ .ipa من صفحة الإصدارات الرسمية
          DOWNLOAD_URL=$(curl -s "https://git.ryujinx.app/melonx/emu/-/releases" | grep -oP '(?<=href=")[^"]+\.ipa' | head -n 1)
          
          if [[ $DOWNLOAD_URL != http* ]]; then
            DOWNLOAD_URL="https://git.ryujinx.app$DOWNLOAD_URL"
          fi
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L "$DOWNLOAD_URL" -o apps/emulators/melonx.ipa

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # الرفع إلى قسم الـ Releases لتجاوز قيود حجم الملفات في GitHub
          gh release create nightly --title "Nightly Builds" --notes "Auto-updated nightly builds" || echo "Release already exists"
          gh release upload nightly apps/emulators/melonx.ipa --clobber

      - name: Safely update JSON version
        run: |
          # تحديث رقم الإصدار والتاريخ في repo.json للتطبيق الثاني (MeloNX)
          VERSION=$(date +'%Y.%m.%d.%H%M')
          jq ".apps[1].versions[0].version = \"$VERSION\"" repo.json > temp.json && mv temp.json repo.json
          
          # تحديث التاريخ أيضاً لضمان ظهور التحديث في SideStore
          DATE_NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq ".apps[1].versions[0].date = \"$DATE_NOW\"" repo.json > temp.json && mv temp.json repo.json

      - name: Commit & push JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git commit -m "Update MeloNX to $VERSION" || echo "No changes to commit"
          git push
